user  nginx;
worker_processes auto;
worker_rlimit_nofile 131072;

error_log  /dev/stderr notice;
pid        /var/run/nginx.pid;

events {
    worker_connections 32768;
    multi_accept on;
    use epoll;
}

http {
    default_type application/octet-stream;
    server_tokens off;

    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    'upstream=$upstream_addr '
                    'rt=$request_time urt=$upstream_response_time '
                    'ust=$upstream_status';
    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # 客户端到 nginx
    keepalive_timeout 75s;
    keepalive_requests 10000;

    client_max_body_size 512m;
    client_body_buffer_size 1m;
    client_header_timeout 60s;
    client_body_timeout 300s;
    send_timeout 3600s;

    # nginx 到上游
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;

    # 快速建联，生成阶段长等待
    proxy_connect_timeout 3s;
    proxy_send_timeout    3600s;
    proxy_read_timeout    3600s;

    # 故障切换：单次尝试 10s 封顶，避免挂在 hang 住的后端
    proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 10s;

    # 流式 SSE 需要实时透传
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;

    upstream qwen35_backend {
        least_conn;

        # 129: 16 实例
        server 10.2.0.129:8001 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:8002 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:8003 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:8004 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:8005 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:8006 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:8007 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:8008 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:8009 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:8010 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:8011 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:8012 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:8013 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:8014 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:8015 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:8016 max_fails=2 fail_timeout=15s;

        # 130: 16 实例
        server 10.2.0.130:8001 max_fails=2 fail_timeout=15s;
        server 10.2.0.130:8002 max_fails=2 fail_timeout=15s;
        server 10.2.0.130:8003 max_fails=2 fail_timeout=15s;
        server 10.2.0.130:8004 max_fails=2 fail_timeout=15s;
        server 10.2.0.130:8005 max_fails=2 fail_timeout=15s;
        server 10.2.0.130:8006 max_fails=2 fail_timeout=15s;
        server 10.2.0.130:8007 max_fails=2 fail_timeout=15s;
        server 10.2.0.130:8008 max_fails=2 fail_timeout=15s;
        server 10.2.0.130:8009 max_fails=2 fail_timeout=15s;
        server 10.2.0.130:8010 max_fails=2 fail_timeout=15s;
        server 10.2.0.130:8011 max_fails=2 fail_timeout=15s;
        server 10.2.0.130:8012 max_fails=2 fail_timeout=15s;
        server 10.2.0.130:8013 max_fails=2 fail_timeout=15s;
        server 10.2.0.130:8014 max_fails=2 fail_timeout=15s;
        server 10.2.0.130:8015 max_fails=2 fail_timeout=15s;
        server 10.2.0.130:8016 max_fails=2 fail_timeout=15s;

        # 131: 8 实例
        server 10.2.0.131:8001 max_fails=2 fail_timeout=15s;
        server 10.2.0.131:8002 max_fails=2 fail_timeout=15s;
        server 10.2.0.131:8003 max_fails=2 fail_timeout=15s;
        server 10.2.0.131:8004 max_fails=2 fail_timeout=15s;
        server 10.2.0.131:8005 max_fails=2 fail_timeout=15s;
        server 10.2.0.131:8006 max_fails=2 fail_timeout=15s;
        server 10.2.0.131:8007 max_fails=2 fail_timeout=15s;
        server 10.2.0.131:8008 max_fails=2 fail_timeout=15s;

        # 长连池：每 worker 保留 256 条空闲长连，覆盖 40 个上游
        keepalive 256;
        keepalive_timeout 60s;
        keepalive_requests 10000;
    }

    server {
        listen 8000 backlog=4096 reuseport;
        server_name _;

        # 本地健康检查，不打上游
        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        # nginx 自身状态，便于排障（仅本机）
        location = /nginx_status {
            access_log off;
            stub_status on;
            allow 127.0.0.1;
            deny all;
        }

        # OpenAI 兼容接口，全部转发到后端池
        location / {
            proxy_pass http://qwen35_backend;
        }
    }
}
