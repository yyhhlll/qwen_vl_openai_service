x-backend-common: &backend-common
  image: ${IMAGE_NAME:-qwen27-vllm-custom}
  network_mode: host
  shm_size: ${SHM_SIZE:-200g}
  privileged: true
  user: root
  restart: unless-stopped
  devices:
    - /dev/kfd
    - /dev/dri
    - /dev/mkfd
  group_add:
    - video
  cap_add:
    - SYS_PTRACE
  security_opt:
    - seccomp=unconfined
  environment: &backend-env
    MODEL_PATH: ${MODEL_PATH:-/models/Qwen3.5-4B}
    MODEL_NAME: ${MODEL_NAME:-Qwen3.5-4B}
    API_KEY: ${API_KEY:-1234}
    DEVICE_MAP: ${DEVICE_MAP:-cuda}
    MAX_BATCH_SIZE: ${MAX_BATCH_SIZE:-4}
    BATCH_WAIT_MS: ${BATCH_WAIT_MS:-50}
    GPU_MEMORY_CLEANUP_INTERVAL: ${GPU_MEMORY_CLEANUP_INTERVAL:-32}
    LOAD_MODEL_ON_STARTUP: ${LOAD_MODEL_ON_STARTUP:-1}
    OFFLINE_MODE: ${OFFLINE_MODE:-1}
    ALLOW_REMOTE_IMAGE_URLS: ${ALLOW_REMOTE_IMAGE_URLS:-1}
    REMOTE_IMAGE_TIMEOUT_SECONDS: ${REMOTE_IMAGE_TIMEOUT_SECONDS:-60}
    HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
    TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-1}
  volumes: &backend-volumes
    - /opt/hyhal:/opt/hyhal:ro
    - /data/model/Qwen3.5-4B:/models/Qwen3.5-4B
    - /root/evalscope_offline:/root/evalscope_offline
    - .:/app/qwen_vl_openai_service

x-proxy-common: &proxy-common
  image: ${IMAGE_NAME:-qwen27-vllm-custom}
  network_mode: host
  user: root
  restart: unless-stopped
  volumes:
    - .:/app/qwen_vl_openai_service
  environment:
    API_KEY: ${API_KEY:-1234}
    VISION_MODEL_NAME: ${VISION_MODEL_NAME:-Qwen3.5-4B}
    TEXT_MODEL_NAME: ${TEXT_MODEL_NAME:-Qwen3.5-0.6B}
    BACKEND_URLS: >-
      ${BACKEND_URLS:-http://10.2.0.129:8005,http://10.2.0.129:8006,http://10.2.0.129:8007,http://10.2.0.129:8008,
      http://10.2.0.130:8001,http://10.2.0.130:8002,http://10.2.0.130:8003,http://10.2.0.130:8004,
      http://10.2.0.130:8005,http://10.2.0.130:8006,http://10.2.0.130:8007,http://10.2.0.130:8008,
      http://10.2.0.131:8001,http://10.2.0.131:8002,http://10.2.0.131:8003}
    TEXT_BACKEND_URLS: >-
      ${TEXT_BACKEND_URLS:-http://10.2.0.129:12001,http://10.2.0.129:12002,http://10.2.0.129:12003,http://10.2.0.129:12004}

services:
  qwen35-129-g4:
    <<: *backend-common
    container_name: qwen35-129-g4
    profiles: ["host129"]
    environment:
      <<: *backend-env
      HIP_VISIBLE_DEVICES: "4"
    command: ["bash", "-lc", "python3 -m uvicorn server:app --app-dir /app/qwen_vl_openai_service --host 0.0.0.0 --port 8005"]

