user  nginx;
worker_processes auto;
worker_rlimit_nofile 131072;

error_log  /dev/stderr notice;
pid        /var/run/nginx.pid;

events {
    worker_connections 32768;
    multi_accept on;
    use epoll;
}

http {
    default_type application/octet-stream;
    server_tokens off;

    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    'upstream=$upstream_addr '
                    'rt=$request_time urt=$upstream_response_time '
                    'ust=$upstream_status';
    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 75s;
    keepalive_requests 10000;

    # 纯文本请求体通常很小；保留 16m 以兼容长 prompt / 批量评测。
    client_max_body_size 16m;
    client_body_buffer_size 1m;
    client_header_timeout 60s;
    client_body_timeout 300s;
    send_timeout 3600s;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;

    proxy_connect_timeout 3s;
    proxy_send_timeout    3600s;
    proxy_read_timeout    3600s;

    proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 10s;

    # vLLM OpenAI SSE streaming needs immediate forwarding.
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;

    upstream qwen35_text_backend {
        least_conn;

        # 129: 4 instances, GPU 0-3
        server 10.2.0.129:12001 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:12002 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:12003 max_fails=2 fail_timeout=15s;
        server 10.2.0.129:12004 max_fails=2 fail_timeout=15s;

        keepalive 256;
        keepalive_timeout 60s;
        keepalive_requests 10000;
    }

    server {
        listen 12000 backlog=4096 reuseport;
        server_name _;

        # nginx process health only. Use /v1/models to verify real vLLM backends.
        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location = /nginx_status {
            access_log off;
            stub_status on;
            allow 127.0.0.1;
            deny all;
        }

        location / {
            proxy_pass http://qwen35_text_backend;
        }
    }
}
