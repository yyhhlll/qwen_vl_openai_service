x-vllm-common: &vllm-common
  image: ${IMAGE_NAME:-image.sourcefind.cn:5000/dcu/admin/base/vllm:0.8.5-ubuntu22.04-dtk25.04.1-rc5-das1.6-py3.10-20250705}
  network_mode: host
  shm_size: ${SHM_SIZE:-200g}
  privileged: true
  user: root
  restart: unless-stopped
  devices:
    - /dev/kfd
    - /dev/dri
    - /dev/mkfd
  group_add:
    - video
  cap_add:
    - SYS_PTRACE
  security_opt:
    - seccomp=unconfined
  environment: &vllm-env
    MODEL_PATH: ${MODEL_PATH:-/models}
    MODEL_NAME: ${MODEL_NAME:-Qwen3.5-0.6B}
    API_KEY: ${API_KEY:-1234}
    DEVICE_MAP: ${DEVICE_MAP:-cuda}
    MASTER_ADDR: ${MASTER_ADDR:-127.0.0.1}
    VLLM_HOST: ${VLLM_HOST:-0.0.0.0}
    MAX_MODEL_LEN: ${MAX_MODEL_LEN:-4096}
    GPU_MEMORY_UTILIZATION: ${GPU_MEMORY_UTILIZATION:-0.9}
    VLLM_USE_FLASH_ATTN: ${VLLM_USE_FLASH_ATTN:-0}
    VLLM_USE_TRITON_FLASH_ATTN: ${VLLM_USE_TRITON_FLASH_ATTN:-0}
    TORCH_COMPILE_DISABLE: ${TORCH_COMPILE_DISABLE:-1}
    VLLM_ATTENTION_BACKEND: ${VLLM_ATTENTION_BACKEND:-TORCH_SDPA}
    HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
    TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-1}
  volumes: &vllm-volumes
    - /opt/hyhal:/opt/hyhal:ro
    - /data/model/Qwen3.5-0.6B:/models:ro
  command: &vllm-command
    - bash
    - -lc
    - >-
      vllm serve "$${MODEL_PATH:-/models}"
      --served-model-name "$${MODEL_NAME:-Qwen3.5-0.6B}"
      --gpu-memory-utilization "$${GPU_MEMORY_UTILIZATION:-0.9}"
      --host "$${VLLM_HOST:-0.0.0.0}"
      --port "$${VLLM_PORT:-12000}"
      --max-model-len "$${MAX_MODEL_LEN:-4096}"
      --api-key "$${API_KEY:-1234}"
      $${EXTRA_VLLM_ARGS:-}

services:
  # 单卡验证：使用用户给出的 12000 端口。不要与 nginx profile 同时启动。
  qwen35-text-single-g0:
    <<: *vllm-common
    container_name: qwen35-text-single-g0
    profiles: ["single"]
    environment:
      <<: *vllm-env
      HIP_VISIBLE_DEVICES: "0"
      VLLM_PORT: "12000"
      MASTER_PORT: "12100"

  # 10.2.0.129: 4 张卡，端口 12001-12004。
  qwen35-text-129-g0:
    <<: *vllm-common
    container_name: qwen35-text-129-g0
    profiles: ["host129"]
    environment: { <<: *vllm-env, HIP_VISIBLE_DEVICES: "0", VLLM_PORT: "12001", MASTER_PORT: "12101" }

  qwen35-text-129-g1:
    <<: *vllm-common
    container_name: qwen35-text-129-g1
    profiles: ["host129"]
    environment: { <<: *vllm-env, HIP_VISIBLE_DEVICES: "1", VLLM_PORT: "12002", MASTER_PORT: "12102" }

  qwen35-text-129-g2:
    <<: *vllm-common
    container_name: qwen35-text-129-g2
    profiles: ["host129"]
    environment: { <<: *vllm-env, HIP_VISIBLE_DEVICES: "2", VLLM_PORT: "12003", MASTER_PORT: "12103" }

  qwen35-text-129-g3:
    <<: *vllm-common
    container_name: qwen35-text-129-g3
    profiles: ["host129"]
    environment: { <<: *vllm-env, HIP_VISIBLE_DEVICES: "3", VLLM_PORT: "12004", MASTER_PORT: "12104" }

  qwen35-text-nginx:
    image: ${NGINX_IMAGE:-nginx:stable-alpine}
    container_name: qwen35-text-nginx
    network_mode: host
    restart: unless-stopped
    profiles: ["nginx"]
    volumes:
      - ./qwen35_text.nginx.conf:/etc/nginx/nginx.conf:ro
